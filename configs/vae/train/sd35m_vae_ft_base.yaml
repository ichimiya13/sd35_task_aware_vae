experiment_name: sd35m_vae_ft_base
seed: 42

runtime:
  gpu_ids: [0]

data:
  root: "../data/uwf/multilabel/MedicalCheckup/splitted"
  split_filename: "default_split.yaml"
  train_split: "train"
  val_split: "val"
  label_schema_file: "configs/labels/proposed_schema.yaml"
  mean: [0.485, 0.456, 0.406]
  std:  [0.229, 0.224, 0.225]

image:
  center_crop_size: 3072
  image_size: 1024

model:
  family: sd35
  variant: medium
  repo_id: stabilityai/stable-diffusion-3.5-medium
  device: cuda
  torch_dtype: bf16
  allow_tf32: true

vae:
  backend: sd35
  use_official: true
  subfolder: vae
  checkpoint: null
  posterior: mode
  freeze_patterns: []
  unfreeze_patterns: []

teacher:
  checkpoint: "outputs/checkpoints/teacher/teacher_convnextl_proposed/best.pt"
  imagenet_pretrained: true
  feature_stage: embedding

train:
  epochs: 10
  batch_size: 2
  num_workers: 4
  lr: 1.0e-5
  weight_decay: 0.0
  grad_accum_steps: 4
  optimizer: adamw
  lr_scheduler: cosine
  save_previews: true
  drop_last: true

loss:
  recon_type: l1
  recon_weight: 1.0
  kl_weight: 1.0e-6
  feature_weight: 0.0
  logit_weight: 0.0
  noise_feature_weight: 0.0

noise_conditioning:
  mode: gaussian
  min_beta: 0.02
  max_beta: 0.25

output:
  root_dir: outputs/checkpoints/vae

wandb:
  enabled: true
  project: uwf-sd35
  name: sd35m_vae_ft_base
  mode: online
  log_interval_steps: 10
