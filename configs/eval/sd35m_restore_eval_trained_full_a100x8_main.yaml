experiment_name: sd35m_restore_eval_trained_full_a100x8_main
seed: 42

runtime:
  gpu_ids: [0]

data:
  root: "../data/uwf/multilabel/MedicalCheckup/splitted"
  split_filename: "default_split.yaml"
  split: "val"
  label_schema_file: "configs/labels/proposed_schema.yaml"
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

image:
  center_crop_size: 3072
  image_size: 1024

teacher:
  checkpoint: "outputs/checkpoints/teacher/teacher_convnextl_proposed/best.pt"
  imagenet_pretrained: true

model:
  family: sd35
  variant: medium
  repo_id: stabilityai/stable-diffusion-3.5-medium
  device: cuda
  torch_dtype: bf16
  enable_cpu_offload: false
  allow_tf32: true
  num_inference_steps: 40
  guidance_scale: 4.5
  max_sequence_length: 256

transformer:
  checkpoint: "outputs/checkpoints/sd3/sd35m_dit_full_ft_a100x8_main/best/transformer"
  lora_path: null

vae:
  backend: sd35
  use_official: true
  subfolder: vae
  checkpoint: null
  posterior: mode

eval:
  batch_size: 4
  num_workers: 2
  timesteps: [50, 100, 200, 400]
  reverse_steps: 40
  guidance_scale: 4.5
  max_sequence_length: 256
  agreement:
    embedding_cosine: true
  save_topk: 16

prompt:
  mode: neutral
  neutral_prompt: "ultra-widefield fundus photograph, clinical retinal imaging, medically faithful"
  negative_prompt: "cartoon, illustration, painting, text overlay, watermark, duplicated vessels"

threshold:
  mode: search_on_real_val
  grid:
    start: 0.01
    end: 0.99
    num: 199

output:
  root_dir: outputs/eval/sd3_restore
  save_topk: 16
