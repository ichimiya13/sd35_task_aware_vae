experiment_name: sd35m_generate_neutral_count_trained_fullvae_center_patch_only_dit_ft_a100x8_main
seed: 42

runtime:
  gpu_ids: [0]

data:
  label_schema_file: "configs/labels/proposed_schema.yaml"
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

image:
  center_crop_size: 3072
  image_size: 1024

teacher:
  checkpoint: null
  imagenet_pretrained: true

model:
  family: sd35
  variant: medium
  repo_id: stabilityai/stable-diffusion-3.5-medium
  device: cuda
  torch_dtype: bf16
  enable_cpu_offload: false
  allow_tf32: true
  num_inference_steps: 40
  guidance_scale: 3.5

transformer:
  checkpoint: outputs/checkpoints/sd3/sd35m_dit_full_ft_from_fullvae_center_patch_only_a100x8_main/best/transformer
  lora_path: null

vae:
  backend: sd35
  use_official: false
  subfolder: ""
  checkpoint: outputs/checkpoints/vae/sd35m_vae_ft_full_center_patch_only/best/vae_latent_calibrated
  posterior: mode

prompt:
  mode: neutral_count
  template_file: "configs/prompts/prompt_templates_medium.yaml"
  neutral_prompt: "ultra-widefield fundus photograph, clinical retinal imaging, medically faithful"
  use_negative_prompt: false

generation:
  mode: text2img
  batch_size: 2
  num_images: 64
  filename_pattern: "{target_id}__{idx:04d}{suffix}"

filter:
  enabled: false

output:
  root_dir: outputs/aug/sd3
  copy_labels: false
  write_split_yaml: true
  split_name: sd35m_generate_neutral_count_trained_fullvae_center_patch_only_dit_ft_a100x8_main
