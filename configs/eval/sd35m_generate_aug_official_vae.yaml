experiment_name: sd35m_generate_aug_official_vae
seed: 42

data:
  root: "../data/uwf/multilabel/MedicalCheckup/splitted"
  split_filename: "default_split.yaml"
  split: "train"
  label_schema_file: "configs/labels/proposed_schema.yaml"
  mean: [0.485, 0.456, 0.406]
  std:  [0.229, 0.224, 0.225]

image:
  center_crop_size: 3072
  image_size: 1024

teacher:
  checkpoint: "outputs/checkpoints/teacher/teacher_convnextl_proposed/best.pt"
  imagenet_pretrained: true

model:
  family: sd35
  variant: medium
  repo_id: stabilityai/stable-diffusion-3.5-medium
  device: cuda
  torch_dtype: bf16
  enable_cpu_offload: false
  allow_tf32: true
  num_inference_steps: 40
  guidance_scale: 4.5
  strength: 0.6

vae:
  backend: sd35
  use_official: true
  subfolder: vae
  checkpoint: null

prompt:
  mode: label_conditioned
  label_prompt_prefix: "ultra-widefield fundus photograph showing "
  label_prompt_suffix: ", realistic clinical retinal imaging"
  label_prompt_none: "no clearly visible retinal abnormality"
  label_separator: ", "
  negative_prompt: "cartoon, illustration, painting, text overlay, watermark, duplicated vessels"

generation:
  mode: img2img
  batch_size: 2
  num_workers: 0
  num_images_per_input: 1
  filename_pattern: "{stem}__aug{idx:02d}.png"

filter:
  enabled: true
  min_match_score: 0.5
  min_max_probability: 0.0

output:
  root_dir: outputs/aug/sd3
  copy_labels: true
  write_split_yaml: true
  split_filename: generated_split.yaml
