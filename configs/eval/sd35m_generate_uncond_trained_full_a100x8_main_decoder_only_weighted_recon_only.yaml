data:
  label_schema_file: configs/labels/proposed_schema.yaml
  mean:
  - 0.485
  - 0.456
  - 0.406
  root: ../data/uwf/multilabel/MedicalCheckup/splitted
  split: val
  split_filename: default_split.yaml
  std:
  - 0.229
  - 0.224
  - 0.225
experiment_name: sd35m_generate_uncond_trained_full_a100x8_main_decoder_only_weighted_recon_only
filter:
  enabled: false
generation:
  batch_size: 1
  filename_pattern: '{stem}__decoder_only_weighted_recon_only{idx:02d}.png'
  mode: text2img
  num_images_per_input: 1
  num_workers: 0
image:
  center_crop_size: 3072
  image_size: 1024
model:
  allow_tf32: true
  device: cuda
  enable_cpu_offload: false
  family: sd35
  guidance_scale: 4.5
  num_inference_steps: 40
  repo_id: stabilityai/stable-diffusion-3.5-medium
  strength: 0.6
  torch_dtype: bf16
  variant: medium
output:
  copy_labels: false
  root_dir: outputs/aug/sd3
  write_split_yaml: false
prompt:
  mode: neutral
  negative_prompt: cartoon, illustration, painting, text overlay, watermark, duplicated
    vessels
  neutral_prompt: ultra-widefield fundus photograph, clinical retinal imaging, medically
    faithful
runtime:
  gpu_ids:
  - 0
seed: 42
teacher:
  checkpoint: outputs/checkpoints/teacher/teacher_convnextl_proposed/best.pt
  imagenet_pretrained: true
transformer:
  checkpoint: outputs/checkpoints/sd3/sd35m_dit_full_ft_a100x8_main/best/transformer
  lora_path: null
vae:
  backend: sd35
  use_official: false
  subfolder: ''
  checkpoint: outputs/checkpoints/vae/sd35m_vae_ft_decoder_only_weighted_recon_only/best/vae
