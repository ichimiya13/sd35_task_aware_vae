experiment_name: sd35m_generate_aug_trained_full_a100x8_main
seed: 42

runtime:
  gpu_ids: [0]

data:
  root: "../data/uwf/multilabel/MedicalCheckup/splitted"
  split_filename: "default_split.yaml"
  split: "val"
  label_schema_file: "configs/labels/proposed_schema.yaml"
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

image:
  center_crop_size: 3072
  image_size: 1024

teacher:
  checkpoint: "outputs/checkpoints/teacher/teacher_convnextl_proposed/best.pt"
  imagenet_pretrained: true

model:
  family: sd35
  variant: medium
  repo_id: stabilityai/stable-diffusion-3.5-medium
  device: cuda
  torch_dtype: bf16
  enable_cpu_offload: false
  allow_tf32: true
  num_inference_steps: 40
  guidance_scale: 4.5
  strength: 0.6

transformer:
  checkpoint: "outputs/checkpoints/sd3/sd35m_dit_full_ft_a100x8_main/best/transformer"
  lora_path: null

vae:
  backend: sd35
  use_official: true
  subfolder: vae
  checkpoint: null

prompt:
  mode: neutral
  neutral_prompt: "ultra-widefield fundus photograph, clinical retinal imaging, medically faithful"
  negative_prompt: "cartoon, illustration, painting, text overlay, watermark, duplicated vessels"

generation:
  mode: text2img
  batch_size: 1
  num_workers: 0
  num_images_per_input: 1
  filename_pattern: "{stem}__fullft{idx:02d}.png"

filter:
  enabled: false

output:
  root_dir: outputs/aug/sd3
  copy_labels: false
  write_split_yaml: false
